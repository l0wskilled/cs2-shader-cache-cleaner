name: Build and Release Windows App
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Standalone EXE
        run: dotnet publish CS2ShaderCleaner.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:PublishTrimmed=false -o ./dist

      # SCHRITT A: Wird IMMER ausgeführt. Speichert die EXE intern in den Actions (Artifacts)
      - name: Upload Internal Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ShaderCleaner-DevBuild
          path: ./dist/CS2ShaderCleaner.exe

      # SCHRITT B: Wird NUR ausgeführt, wenn es sich um einen Version-Tag handelt
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Official standalone executable for the CS2 Shader Cache Cleaner (${{ github.ref_name }}).
            
            **Instructions:**
            1. Download `CS2ShaderCleaner.exe` below.
            2. Right-click the file and select **"Run as Administrator"**.
          draft: false
          prerelease: false
          files: ./dist/CS2ShaderCleaner.exe
