name: Build and Release Windows App
on:
  push:
    tags:
      - 'v*' # Triggered immer, wenn ein Push mit einem Tag passiert, der mit "v" beginnt (z.B. v1.0.0)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Standalone EXE
        run: dotnet publish CS2ShaderCleaner.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=false -o ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }} # Holt sich automatisch den Tag-Namen (z.B. v1.0.0)
          name: Release ${{ github.ref_name }}
          body: |
            Official standalone executable for the CS2 Shader Cache Cleaner (${{ github.ref_name }}).
            
            **Instructions:**
            1. Download `CS2ShaderCleaner.exe` below.
            2. Right-click the file and select **"Run as Administrator"**.
          draft: false
          prerelease: false
          files: ./dist/CS2ShaderCleaner.exe
